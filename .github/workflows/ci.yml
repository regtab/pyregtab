name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  grammar-sync:
    # The normative RTL grammar (grammar/RTL.g4) is a pinned copy of the
    # jRegTab grammar; verify it has not drifted (plan §5.2).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check grammar is in sync with the pinned upstream
        env:
          # Optional: a read token for the (private) jregtab repo enables the
          # byte-for-byte upstream cross-check; without it, only the offline
          # hash check runs.
          JREGTAB_TOKEN: ${{ secrets.JREGTAB_TOKEN }}
        run: python tools/check_grammar_sync.py

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Lint (clippy, blocking)
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy --all-targets -- -D warnings
      - name: Pure-Rust core (no python feature, consumed by rtl-lsp)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo clippy --all-targets --no-default-features -- -D warnings
          cargo test --no-default-features
      - name: Build and install
        run: |
          pip install maturin pytest
          maturin build --release --out dist
          pip install --no-index --find-links dist pyregtab
      - name: Run test suite (150 tasks + conformance + round-trip)
        run: pytest tests -q

  differential:
    # Differential test against the reference Java implementation (plan
    # §7.3): compiles jRegTab at the pinned tag, dumps its recordsets for all
    # task variants, and compares them cell-by-cell with pyRegTab. Manual
    # trigger (workflow_dispatch) because it needs the JREGTAB_TOKEN secret
    # with read access to the private regtab/jregtab repository.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check out jRegTab at the pinned release
        uses: actions/checkout@v4
        with:
          repository: regtab/jregtab
          ref: v0.4.1
          token: ${{ secrets.JREGTAB_TOKEN }}
          path: jregtab
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Dump reference recordsets from jRegTab
        run: |
          cp tools/RecordsetDumpMain.java jregtab/src/test/java/ru/icc/regtab/
          mvn -q -f jregtab/pom.xml -DskipTests test-compile \
            dependency:build-classpath -Dmdep.outputFile="$PWD/cp.txt"
          java -cp "jregtab/target/test-classes:jregtab/target/classes:$(cat cp.txt)" \
            ru.icc.regtab.RecordsetDumpMain tests/fixtures/tasks conformance/positive dump.jsonl
      - uses: dtolnay/rust-toolchain@stable
      - name: Build and install pyRegTab
        run: |
          pip install maturin
          maturin build --release --out dist
          pip install --no-index --find-links dist pyregtab
      - name: Compare recordsets cell-by-cell
        run: python tools/differential.py dump.jsonl

  docs:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: mkdocs gh-deploy --force

  wheels:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: windows-latest
            target: x86_64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: wheels
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
