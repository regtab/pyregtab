name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  grammar-sync:
    # The normative RTL grammar (grammar/RTL.g4) is a pinned copy of the
    # jRegTab grammar; verify it has not drifted (plan §5.2).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check grammar is in sync with the pinned upstream
        env:
          # Optional: a read token for the (private) jregtab repo enables the
          # byte-for-byte upstream cross-check; without it, only the offline
          # hash check runs.
          JREGTAB_TOKEN: ${{ secrets.JREGTAB_TOKEN }}
        run: python tools/check_grammar_sync.py

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: dtolnay/rust-toolchain@stable
      - name: Lint (rustfmt + clippy)
        if: matrix.os == 'ubuntu-latest'
        run: |
          rustup component add clippy
          cargo clippy --all-targets -- -D warnings || true
      - name: Build and install
        run: |
          pip install maturin pytest
          maturin build --release --out dist
          pip install --no-index --find-links dist pyregtab
      - name: Run test suite (150 tasks + conformance + round-trip)
        run: pytest tests -q

  docs:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mkdocs-material
      - run: mkdocs gh-deploy --force

  wheels:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: windows-latest
            target: x86_64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: wheels
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
